spring.application.name=api-football-board-game

# Active profile: postgres (native local) | docker | local (H2)
spring.profiles.active=postgres

# Server port
server.port=8080

# Google OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com

# Listen on all interfaces for LAN access (football.local)
server.address=0.0.0.0
